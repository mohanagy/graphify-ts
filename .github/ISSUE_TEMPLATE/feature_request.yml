# ---------------------------------------------------------------------------
# Helper functions
# ---------------------------------------------------------------------------

def _resolve_project_root(project_root: Optional[Path]) -> Path:
    """Return a resolved, absolute path to the project root.

    Args:
        project_root: If None, cwd is used.

    Returns:
        Absolute path to the project root directory.
    """
    if project_root is None:
        project_root = DEFAULT_PROJECT_ROOT
    return project_root.resolve()


def _resolve_roadmap_url(roadmap_url: Optional[str]) -> str:
    """Return a validated roadmap URL.

    Falls back to environment variable or default.

    Args:
        roadmap_url: Optional URL provided by user.

    Returns:
        A valid URL string.

    Raises:
        SystemExit: If the URL is invalid.
    """
    if roadmap_url is None:
        roadmap_url = os.environ.get(ENV_ROADMAP_URL_KEY, DEFAULT_ROADMAP_URL)

    if not _is_url_valid(roadmap_url):
        logger.error("Invalid roadmap URL: %s", roadmap_url)
        sys.exit(1)

    return roadmap_url


def _is_url_valid(url: str) -> bool:
    """Check if the URL uses an acceptable scheme and is non-empty.

    Args:
        url: The URL string to validate.

    Returns:
        True if valid, False otherwise.
    """
    return any(url.startswith(scheme + "://") for scheme in _ACCEPTABLE_ROADMAP_SCHEMES)


def _update_roadmap_link(filepath: Path, roadmap_url: str) -> bool:
    """Add or update the public roadmap link in a markdown file.

    Args:
        filepath: Path to the markdown file.
        roadmap_url: The URL to insert.

    Returns:
        True if the file was modified, False otherwise.
    """
    if not filepath.is_file():
        logger.info("Skipping non‑existent file %s", filepath)
        return False

    original = filepath.read_text(encoding="utf-8")
    new_line = _ROADMAP_LINE_TEMPLATE.format(url=roadmap_url)

    # Check if a roadmap line already exists
    match = _ROADMAP_LINE_PATTERN.search(original)
    if match:
        # Replace existing roadmap URL
        updated = original[:match.start(1)] + roadmap_url + original[match.end(1):]
        if updated == original:
            return False
        filepath.write_text(updated, encoding="utf-8")
        logger.info("Updated roadmap URL in %s", filepath)
        return True

    # No existing roadmap line – append before the first trailing newline or at end
    if original.endswith("\n"):
        updated = original + new_line + "\n"
    else:
        updated = original + "\n" + new_line + "\n"
    filepath.write_text(updated, encoding="utf-8")
    logger.info("Added roadmap link to %s", filepath)
    return True


def _write_template(target_path: Path, content: str, roadmap_url: str) -> bool:
    """Write a template file if it doesn't exist or if the content differs.

    Performs roadmap URL substitution in the content.

    Args:
        target_path: Full path where the file should be written.
        content: Template content (may contain ``{roadmap_url}`` placeholder).
        roadmap_url: URL to substitute.

    Returns:
        True if the file was written/updated, False if already up‑to‑date.
    """
    effective_content = content.format(roadmap_url=roadmap_url)

    if target_path.is_file():
        existing = target_path.read_text(encoding="utf-8")
        if existing == effective_content:
            logger.debug("Skipping unchanged %s", target_path)
            return False

    target_path.parent.mkdir(parents=True, exist_ok=True)
    target_path.write_text(effective_content, encoding="utf-8")
    logger.info("Wrote %s", target_path)
    return True


# ---------------------------------------------------------------------------
# Main generation logic
# ---------------------------------------------------------------------------

def generate_contributing_docs(
    project_root: Optional[Path] = None,
    roadmap_url: Optional[str] = None,
) -> None:
    """Create or update all contributing documentation files.

    Args:
        project_root: Root directory of the project. Defaults to cwd.
        roadmap_url: Public roadmap URL. Falls back to environment variable or
            default URL.
    """
    project_root = _resolve_project_root(project_root)
    roadmap_url = _resolve_roadmap_url(roadmap_url)

    templates_dir = project_root / ".github" / "ISSUE_TEMPLATE"

    logger.info("Project root: %s", project_root)
    logger.info("Templates directory: %s", templates_dir)
    logger.info("Roadmap URL: %s", roadmap_url)

    # Write each template
    for filename, content in _TEMPLATES.items():
        if filename == "CONTRIBUTING.md":
            target = project_root / filename
        else:
            # filename is now a basename, e.g., "bug_report.yml"
            target = templates_dir / filename
        _write_template(target, content, roadmap_url)

    # Update roadmap link in README and CHANGELOG (if they exist)
    readme = project_root / "README.md"
    changelog = project_root / "CHANGELOG.md"

    for filepath in (readme, changelog):
        _update_roadmap_link(filepath, roadmap_url)

    logger.info("Done.")


# ---------------------------------------------------------------------------
# CLI entry point
# ---------------------------------------------------------------------------

def parse_args(argv: Optional[List[str]] = None) -> argparse.Namespace:
    """Parse command‑line arguments.

    Args:
        argv: Argument list. If None, uses sys.argv[1:].

    Returns:
        Parsed namespace.
    """
    parser = argparse.ArgumentParser(
        description="Generate GitHub contributing documentation and issue templates.",
    )
    parser.add_argument(
        "--project-root",
        type=Path,
        default=None,
        help="Root directory of the project (default: current working directory).",
    )
    parser.add_argument(
        "--roadmap-url",
        type=str,
        default=None,
        help="URL of the public roadmap (default: %(default)s).",
    )
    return parser.parse_args(argv)


def main(argv: Optional[List[str]] = None) -> NoReturn:
    """Main entry point.

    Args:
        argv: Command‑line arguments. If None, uses sys.argv[1:].

    Returns:
        This function never returns (calls sys.exit).
    """
    args = parse_args(argv)
    generate_contributing_docs(
        project_root=args.project_root,
        roadmap_url=args.roadmap_url,
    )
    sys.exit(0)


if __name__ == "__main__":
    main()
